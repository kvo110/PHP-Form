<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Form Test</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="page">
    <h1>Exercise 1: Multi-Select Debugging</h1>
    <p class="intro">
      Hold Command (⌘) on Mac or Ctrl on Windows to select multiple options.
    </p>

    <!-- This form sends the data to formtest.php -->
    <form action="formtest.php" method="post">
      <div class="form-row">
        <!-- Text input for the visitor name -->
        <label for="visitor_name">Your Name</label>
        <input id="visitor_name" type="text" name="visitor_name" placeholder="Enter your name">
      </div>

      <div class="form-row">
        <!-- Password input just for testing form submission -->
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter a password">
      </div>

      <div class="form-row">
        <label for="options">Optional Features</label>

        <!--
          The [] is important here because it lets PHP receive
          multiple selected values as an array
        -->
        <select id="options" name="options[]" size="6" multiple>
          <option>Chat</option>
          <option>Email</option>
          <option>File transfer</option>
          <option>Directory</option>
          <option>Shell</option>
          <option>Remote control</option>
        </select>
      </div>

      <div class="button-row">
        <input type="submit" value="Sign Up">
      </div>
    </form>

    <p class="back-link">
      <a class="link-button" href="index.html">Back to CW04 Home</a>
    </p>
  </div>
</body>

</html>
