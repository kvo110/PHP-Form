<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Buy A Grade</title>
</head>

<body>
  <h1>Buy Your Way to a Better Grade!</h1>

  <!--
    This form sends the entered data to sucker.php
    where the values will be validated and saved
  -->
  <form action="sucker.php" method="post">
    <dl>
      <dt>Name</dt>
      <dd>
        <!-- Student name input -->
        <input type="text" name="name">
      </dd>

      <dt>Section</dt>
      <dd>
        <!-- Course section dropdown -->
        <select name="section">
          <option value="">(Select a section)</option>
          <option>MA</option>
          <option>MB</option>
          <option>MC</option>
          <option>MD</option>
          <option>ME</option>
          <option>MF</option>
          <option>MG</option>
          <option>MH</option>
        </select>
      </dd>

      <dt>Credit Card</dt>
      <dd>
        <!-- Card number input -->
        <input type="text" name="cardnumber"><br>

        <!-- Radio buttons for card type -->
        <label><input type="radio" name="cardtype" value="visa"> Visa</label>
        <label><input type="radio" name="cardtype" value="mastercard"> MasterCard</label>
      </dd>
    </dl>

    <div>
      <input type="submit" value="I am a giant sucker.">
    </div>
  </form>
</body>

</html>
